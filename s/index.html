<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Opening Legacy Music Player…</title>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #111; color: #eee; margin: 0; padding: 64px 24px; text-align: center; }
  h1 { font-weight: 600; margin: 0 0 12px; font-size: 22px; }
  p { color: #aaa; max-width: 520px; margin: 12px auto; line-height: 1.5; }
  a.btn { display: inline-block; margin-top: 16px; padding: 10px 18px; background: #2a7fd8; color: #fff; text-decoration: none; border-radius: 6px; font-weight: 500; }
  #fallback { display: none; }
</style>
</head>
<body>
  <h1>Opening Legacy Music Player…</h1>
  <p id="loading">If the app doesn't open automatically, make sure it's installed.</p>
  <div id="fallback">
    <p>Still didn't open?</p>
    <a class="btn" id="retry" href="#">Try again</a>
  </div>
<script>
(function () {
  var target = "legacymusicplayer://playlist" + window.location.search;
  document.getElementById("retry").href = target;
  window.location.replace(target);
  setTimeout(function () {
    document.getElementById("fallback").style.display = "block";
  }, 1500);
})();
</script>
</body>
</html>
